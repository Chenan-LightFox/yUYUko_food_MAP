<!doctype html>
<html lang="zh-cn">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>东方饭联地图</title>
    <script type="module">
        // 动态解析 AMap 安全服务地址：优先使用 Vite 环境变量 VITE_BACKEND_URL，
        // 否则回退到当前页面的 origin，方便在远程部署时使用同源后端或反向代理。
        const _backend = (typeof import.meta !== 'undefined' && import.meta.env && import.meta.env.VITE_BACKEND_URL)
            ? String(import.meta.env.VITE_BACKEND_URL).replace(/\/+$|\s+/g, '')
            : window.location.origin;
        window._AMapSecurityConfig = {
            serviceHost: _backend + '/_AMapService'
        };
    </script>
    <script
        src="https://webapi.amap.com/maps?v=2.0&key=c92da5ff295d79be6e55c3dd2946a272&plugin=AMap.MarkerCluster,AMap.PlaceSearch,AMap.Geolocation,AMap.InfoWindow"></script>
    <style>
        :root {
            --app-height: 100vh;
        }

        @supports (height: 100dvh) {
            :root {
                --app-height: 100dvh;
            }
        }

        html,
        body,
        #root {
            height: 100%;
            min-height: 100%;
            margin: 0;
            padding: 0;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .panel {
            position: absolute;
            top: 8px;
            left: 8px;
            z-index: 2000;
            background: white;
            padding: 8px;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        input,
        textarea,
        select {
            font-size: 16px;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 700, 'GRAD' 0, 'opsz' 24
        }
    </style>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>

</html>
